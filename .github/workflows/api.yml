name: Build&Deploy Server App

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - src/**
jobs:
  api-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/assetsfirst-api:latest
  api-deploy:
    needs: api-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$API_HOST" >> ~/.ssh/known_hosts
        env:
          API_HOST: ${{ secrets.SSH_HOST }}
      - name: Create trade-api folder if not exists
        run: |
          ssh $REMOTE_USER@$API_HOST '
            mkdir -p ~/trade-api
          '
        env:
          API_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
      - name: Connect to server
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/trade-api
          && docker-compose pull
          && docker-compose up -d --build
          && docker image prune -a -f && exit"
      - name: cleanup
        run: rm -rf ~/.ssh